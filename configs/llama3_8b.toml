[job]
dump_folder = "./outputs"
description = "llama3-8b-c4"

[profiling]
enable_profiling = false

[metrics]
log_freq = 1
enable_tensorboard = true

[model]
name = "llama3"
flavor = "8B"

[tokenizer]
tokenizer_path = "./tokenizer.model"

[optimizer]
name = "AdamW"
lr = 3e-4

[training]
batch_size = 8
seq_len = 4096
steps = 100

[data]
dataset = "allenai/c4"
dataset_path = ""
tokenizer = "tiktoken"

[parallelism]
data_parallel_replicate_degree = 4
data_parallel_shard_degree = 8
tensor_parallel_degree = 1
pipeline_parallel_degree = 1
context_parallel_degree = 1

[checkpoint]
enable_checkpoint = false