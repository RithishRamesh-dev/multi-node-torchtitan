apiVersion: kubeflow.org/v1
kind: PyTorchJob
metadata:
  name: torchtitan-llama-c4
spec:
  elasticPolicy:
    rdzvBackend: c10d
    minReplicas: 4
    maxReplicas: 4
    nProcPerNode: 8

  pytorchReplicaSpecs:

    Master:
      replicas: 1

      template:
        metadata:
          annotations:
            k8s.v1.cni.cncf.io/networks: >-
              roce-net-fabric0@fabric0,
              roce-net-fabric1@fabric1,
              roce-net-fabric2@fabric2,
              roce-net-fabric3@fabric3,
              roce-net-fabric4@fabric4,
              roce-net-fabric5@fabric5,
              roce-net-fabric6@fabric6,
              roce-net-fabric7@fabric7,
              roce-net-fabric8@fabric8,
              roce-net-fabric9@fabric9,
              roce-net-fabric10@fabric10,
              roce-net-fabric11@fabric11,
              roce-net-fabric12@fabric12,
              roce-net-fabric13@fabric13,
              roce-net-fabric14@fabric14,
              roce-net-fabric15@fabric15

        spec:

          restartPolicy: Never

          containers:
            - name: pytorch
              image: yourrepo/torchtitan:latest

              command:
                - /bin/bash
                - -c
                - |
                  export MASTER_ADDR=$(hostname)
                  export WORLD_SIZE=4
                  export RANK=0

                  bash /workspace/run_torchtitan.sh

              resources:
                limits:
                  nvidia.com/gpu: 8

              volumeMounts:
                - name: dshm
                  mountPath: /dev/shm

          volumes:
            - name: dshm
              emptyDir:
                medium: Memory
                sizeLimit: 32Gi

    Worker:
      replicas: 3

      template:
        metadata:
          annotations:
            k8s.v1.cni.cncf.io/networks: >-
              roce-net-fabric0@fabric0,
              roce-net-fabric1@fabric1,
              roce-net-fabric2@fabric2,
              roce-net-fabric3@fabric3,
              roce-net-fabric4@fabric4,
              roce-net-fabric5@fabric5,
              roce-net-fabric6@fabric6,
              roce-net-fabric7@fabric7,
              roce-net-fabric8@fabric8,
              roce-net-fabric9@fabric9,
              roce-net-fabric10@fabric10,
              roce-net-fabric11@fabric11,
              roce-net-fabric12@fabric12,
              roce-net-fabric13@fabric13,
              roce-net-fabric14@fabric14,
              roce-net-fabric15@fabric15

        spec:

          restartPolicy: Never

          containers:
            - name: pytorch
              image: yourrepo/torchtitan:latest

              command:
                - /bin/bash
                - -c
                - |
                  export MASTER_ADDR=torchtitan-llama-c4-master-0
                  export WORLD_SIZE=4

                  HOSTNAME=$(hostname)

                  if [[ $HOSTNAME =~ worker-0 ]]; then
                    export RANK=1
                  elif [[ $HOSTNAME =~ worker-1 ]]; then
                    export RANK=2
                  else
                    export RANK=3
                  fi

                  bash /workspace/run_torchtitan.sh

              resources:
                limits:
                  nvidia.com/gpu: 8

                  rdma/fabric0: 1
                  rdma/fabric1: 1
                  rdma/fabric2: 1
                  rdma/fabric3: 1
                  rdma/fabric4: 1
                  rdma/fabric5: 1
                  rdma/fabric6: 1
                  rdma/fabric7: 1
                  rdma/fabric8: 1
                  rdma/fabric9: 1
                  rdma/fabric10: 1
                  rdma/fabric11: 1
                  rdma/fabric12: 1
                  rdma/fabric13: 1
                  rdma/fabric14: 1
                  rdma/fabric15: 1

              volumeMounts:
                - name: dshm
                  mountPath: /dev/shm

          volumes:
            - name: dshm
              emptyDir:
                medium: Memory
                sizeLimit: 32Gi