apiVersion: kubeflow.org/v1
kind: PyTorchJob
metadata:
  name: torchtitan-llama-c4

spec:
  runPolicy:
    cleanPodPolicy: Running

  pytorchReplicaSpecs:

    Master:
      replicas: 1
      restartPolicy: Never

      template:
        metadata:
          annotations:
            k8s.v1.cni.cncf.io/networks: >-
              roce-net-fabric0@fabric0,
              roce-net-fabric1@fabric1,
              roce-net-fabric2@fabric2,
              roce-net-fabric3@fabric3,
              roce-net-fabric4@fabric4,
              roce-net-fabric5@fabric5,
              roce-net-fabric6@fabric6,
              roce-net-fabric7@fabric7,
              roce-net-fabric8@fabric8,
              roce-net-fabric9@fabric9,
              roce-net-fabric10@fabric10,
              roce-net-fabric11@fabric11,
              roce-net-fabric12@fabric12,
              roce-net-fabric13@fabric13,
              roce-net-fabric14@fabric14,
              roce-net-fabric15@fabric15

        spec:
          restartPolicy: Never

          imagePullSecrets:
            - name: ghcr-secret

          tolerations:
            - key: "nvidia.com/gpu"
              operator: "Exists"
              effect: "NoSchedule"

          initContainers:
            # FIX: Download tokenizer before training starts.
            # TorchTitan requires tokenizer.model at the path specified in the toml.
            - name: init-pytorch
              image: ghcr.io/rithishramesh-dev/torchtitan-llama:latest
              imagePullPolicy: Always
              command:
                - /bin/bash
                - -c
                - |
                  set -eux
                  cd /workspace/torchtitan
                  # Download tokenizer if not present
                  if [ ! -f tokenizer.model ]; then
                    python scripts/download_tokenizer.py \
                      --repo_id meta-llama/Meta-Llama-3-8B \
                      --tokenizer_path . \
                      --hf_token "${HF_TOKEN:-}"
                  fi
              env:
                - name: HF_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: hf-secret
                      key: token
                      optional: true
              volumeMounts:
                - name: dshm
                  mountPath: /dev/shm

          containers:
            - name: pytorch
              # FIX: Pin image digest or use a versioned tag instead of :latest
              # to ensure all pods run the same rebuilt image.
              # e.g. ghcr.io/rithishramesh-dev/torchtitan-llama:v1.0.0
              image: ghcr.io/rithishramesh-dev/torchtitan-llama:latest
              imagePullPolicy: Always

              env:
                - name: NCCL_DEBUG
                  value: "INFO"
                - name: NCCL_SOCKET_IFNAME
                  value: "eth0"
                - name: NCCL_IB_DISABLE
                  value: "0"
                - name: NCCL_IB_HCA
                  value: "fabric0,fabric1,fabric2,fabric3,fabric4,fabric5,fabric6,fabric7,fabric8,fabric9,fabric10,fabric11,fabric12,fabric13,fabric14,fabric15"
                - name: NCCL_IB_QPS_PER_CONNECTION
                  value: "4"
                - name: NCCL_NET_GDR_LEVEL
                  value: "2"
                - name: NCCL_CROSS_NIC
                  value: "1"
                - name: TORCH_NCCL_ASYNC_ERROR_HANDLING
                  value: "1"
                - name: CUDA_DEVICE_MAX_CONNECTIONS
                  value: "1"

              command:
                - /bin/bash
                - -c
                - |
                  set -eux

                  # PET_* variables are injected by the PyTorch operator
                  export MASTER_ADDR=${PET_MASTER_ADDR}
                  export MASTER_PORT=${PET_MASTER_PORT:-29500}
                  export NODE_RANK=${PET_NODE_RANK}
                  export NNODES=${PET_NNODES}

                  cd /workspace/torchtitan

                  # FIX: Use -m torchtitan.train (not train.py directly)
                  # FIX: Config filename matches what is actually in the container
                  torchrun \
                    --nnodes=${NNODES} \
                    --nproc_per_node=8 \
                    --node_rank=${NODE_RANK} \
                    --master_addr=${MASTER_ADDR} \
                    --master_port=${MASTER_PORT} \
                    -m torchtitan.train \
                    --job.config_file ./configs/llama3_8b.toml

              resources:
                limits:
                  nvidia.com/gpu: 8
                  rdma/fabric0: 1
                  rdma/fabric1: 1
                  rdma/fabric2: 1
                  rdma/fabric3: 1
                  rdma/fabric4: 1
                  rdma/fabric5: 1
                  rdma/fabric6: 1
                  rdma/fabric7: 1
                  rdma/fabric8: 1
                  rdma/fabric9: 1
                  rdma/fabric10: 1
                  rdma/fabric11: 1
                  rdma/fabric12: 1
                  rdma/fabric13: 1
                  rdma/fabric14: 1
                  rdma/fabric15: 1
                requests:
                  nvidia.com/gpu: 8
                  rdma/fabric0: 1
                  rdma/fabric1: 1
                  rdma/fabric2: 1
                  rdma/fabric3: 1
                  rdma/fabric4: 1
                  rdma/fabric5: 1
                  rdma/fabric6: 1
                  rdma/fabric7: 1
                  rdma/fabric8: 1
                  rdma/fabric9: 1
                  rdma/fabric10: 1
                  rdma/fabric11: 1
                  rdma/fabric12: 1
                  rdma/fabric13: 1
                  rdma/fabric14: 1
                  rdma/fabric15: 1

              volumeMounts:
                - name: dshm
                  mountPath: /dev/shm

          volumes:
            - name: dshm
              emptyDir:
                medium: Memory
                sizeLimit: 32Gi


    Worker:
      replicas: 3
      restartPolicy: Never

      template:
        metadata:
          annotations:
            k8s.v1.cni.cncf.io/networks: >-
              roce-net-fabric0@fabric0,
              roce-net-fabric1@fabric1,
              roce-net-fabric2@fabric2,
              roce-net-fabric3@fabric3,
              roce-net-fabric4@fabric4,
              roce-net-fabric5@fabric5,
              roce-net-fabric6@fabric6,
              roce-net-fabric7@fabric7,
              roce-net-fabric8@fabric8,
              roce-net-fabric9@fabric9,
              roce-net-fabric10@fabric10,
              roce-net-fabric11@fabric11,
              roce-net-fabric12@fabric12,
              roce-net-fabric13@fabric13,
              roce-net-fabric14@fabric14,
              roce-net-fabric15@fabric15

        spec:
          restartPolicy: Never

          imagePullSecrets:
            - name: ghcr-secret

          tolerations:
            - key: "nvidia.com/gpu"
              operator: "Exists"
              effect: "NoSchedule"

          containers:
            - name: pytorch
              image: ghcr.io/rithishramesh-dev/torchtitan-llama:latest
              imagePullPolicy: Always

              env:
                - name: NCCL_DEBUG
                  value: "INFO"
                - name: NCCL_SOCKET_IFNAME
                  value: "eth0"
                - name: NCCL_IB_DISABLE
                  value: "0"
                - name: NCCL_IB_HCA
                  value: "fabric0,fabric1,fabric2,fabric3,fabric4,fabric5,fabric6,fabric7,fabric8,fabric9,fabric10,fabric11,fabric12,fabric13,fabric14,fabric15"
                - name: NCCL_IB_QPS_PER_CONNECTION
                  value: "4"
                - name: NCCL_NET_GDR_LEVEL
                  value: "2"
                - name: NCCL_CROSS_NIC
                  value: "1"
                - name: TORCH_NCCL_ASYNC_ERROR_HANDLING
                  value: "1"
                - name: CUDA_DEVICE_MAX_CONNECTIONS
                  value: "1"

              command:
                - /bin/bash
                - -c
                - |
                  set -eux

                  export MASTER_ADDR=${PET_MASTER_ADDR}
                  export MASTER_PORT=${PET_MASTER_PORT:-29500}
                  export NODE_RANK=${PET_NODE_RANK}
                  export NNODES=${PET_NNODES}

                  cd /workspace/torchtitan

                  torchrun \
                    --nnodes=${NNODES} \
                    --nproc_per_node=8 \
                    --node_rank=${NODE_RANK} \
                    --master_addr=${MASTER_ADDR} \
                    --master_port=${MASTER_PORT} \
                    -m torchtitan.train \
                    --job.config_file ./configs/llama3_8b.toml

              resources:
                limits:
                  nvidia.com/gpu: 8
                  rdma/fabric0: 1
                  rdma/fabric1: 1
                  rdma/fabric2: 1
                  rdma/fabric3: 1
                  rdma/fabric4: 1
                  rdma/fabric5: 1
                  rdma/fabric6: 1
                  rdma/fabric7: 1
                  rdma/fabric8: 1
                  rdma/fabric9: 1
                  rdma/fabric10: 1
                  rdma/fabric11: 1
                  rdma/fabric12: 1
                  rdma/fabric13: 1
                  rdma/fabric14: 1
                  rdma/fabric15: 1
                requests:
                  nvidia.com/gpu: 8
                  rdma/fabric0: 1
                  rdma/fabric1: 1
                  rdma/fabric2: 1
                  rdma/fabric3: 1
                  rdma/fabric4: 1
                  rdma/fabric5: 1
                  rdma/fabric6: 1
                  rdma/fabric7: 1
                  rdma/fabric8: 1
                  rdma/fabric9: 1
                  rdma/fabric10: 1
                  rdma/fabric11: 1
                  rdma/fabric12: 1
                  rdma/fabric13: 1
                  rdma/fabric14: 1
                  rdma/fabric15: 1

              volumeMounts:
                - name: dshm
                  mountPath: /dev/shm

          volumes:
            - name: dshm
              emptyDir:
                medium: Memory
                sizeLimit: 32Gi